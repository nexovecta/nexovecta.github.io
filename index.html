
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0e1015;
      --surface: #161a24;
      --surface-2: #1d2230;
      --primary: #5f9cff;
      --text: #e7eaf3;
      --muted: #9aa3b2;
      --radius: 16px;
      --shadow: 0 20px 50px rgba(0,0,0,.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(900px 500px at 15% 0%, #1a2240, transparent),
        radial-gradient(700px 400px at 85% 10%, #121933, transparent),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 48px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 32px;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 6px;
    }

    .clock {
      font-size: 2.8rem;
      font-weight: 600;
      color: var(--primary);
      letter-spacing: -0.04em;
    }

    /* Search */
    .search {
      display: flex;
      justify-content: center;
    }

    .search input {
      width: 100%;
      max-width: 560px;
      padding: 16px 22px;
      font-size: 1rem;
      border-radius: 999px;
      border: none;
      outline: none;
      background: linear-gradient(180deg, var(--surface-2), var(--surface));
      color: var(--text);
      box-shadow: var(--shadow);
    }

    .search input::placeholder {
      color: #7f8798;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .card {
      background: linear-gradient(180deg, var(--surface-2), var(--surface));
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
    }

    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 16px;
      color: #cfd6ff;
      font-weight: 600;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .links a {
      text-decoration: none;
      color: var(--text);
      background: #121624;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 0.9rem;
      transition: background .2s ease, transform .2s ease;
    }

    .links a:hover {
      background: #1c2340;
      transform: translateY(-2px);
    }

    .muted {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    footer {
      text-align: center;
      margin-top: 32px;
      font-size: 0.8rem;
      color: #6f778a;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Header -->
    <header>
      <div>
        <h1 id="greeting">Good day.</h1>
        <div class="subtitle">Focus. Build. Repeat.</div>
      </div>
      <div class="clock" id="clock">--:--</div>
    </header>

    <!-- Search -->
    <div class="search">
      <form action="https://www.google.com/search" method="get">
        <input
          type="text"
          name="q"
          placeholder="Search the web…"
          autofocus
        />
      </form>
    </div>

    <!-- Main -->
    <section class="grid">

      <div class="card">
        <h2>Daily</h2>
        <div class="links">
          <a href="https://google.com">Google</a>
          <a href="https://gmail.com">Gmail</a>
          <a href="https://youtube.com">YouTube</a>
          <a href="https://calendar.google.com">Calendar</a>
        </div>
      </div>

      <div class="card">
        <h2>Work</h2>
        <div class="links">
          <a href="https://github.com">GitHub</a>
          <a href="#">Docs</a>
          <a href="#">Dashboard</a>
          <a href="#">Notion</a>
        </div>
      </div>

      <div class="card">
        <h2>Weather</h2>
        <div class="muted" id="weather">
          Clear skies · 21°C<br>
          Calm and focused
        </div>
      </div>

      <div class="card">
        <h2>Today</h2>
        <div class="muted" id="quote">
          “Small progress is still progress.”
        </div>
      </div>

    </section>

    <footer>
      Your calm place on the web
    </footer>

  </div>

  <script>
    /* Clock */
    function updateClock() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('clock').textContent = `${h}:${m}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    /* Greeting */
    const hour = new Date().getHours();
    const greeting =
      hour < 12 ? "Good morning." :
      hour < 18 ? "Good afternoon." :
      "Good evening.";
    document.getElementById('greeting').textContent = greeting;

    /* Quote (local, calm) */
    const quotes = [
      "Do less, but better.",
      "Consistency beats intensity.",
      "Focus is a superpower.",
      "Small progress compounds.",
      "Clarity creates momentum."
    ];
    document.getElementById('quote').textContent =
      quotes[Math.floor(Math.random() * quotes.length)];
  </script>

</body>
</html>
